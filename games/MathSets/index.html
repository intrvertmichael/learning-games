<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathSets</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <a href="../../">Back Home</a>
      <div id="header">MathSets</div>
      <p id="subtitle">count the pencils in each set</p>

      <div class="score-bar">
        <span>Checks: <span class="score-val" id="checks">0</span>/10</span>
        <span>Incorrect: <span class="score-val" id="incorrect">0</span></span>
      </div>

      <div id="checks-row" aria-label="checks earned"></div>

      <main id="game-panel">
        <div id="prompt-label">How many pencils?</div>
        <div id="pencil-set" aria-live="polite"></div>
      </main>

      <div id="options" aria-label="number choices"></div>
    </div>

    <div id="congrats">
      <div class="big-emoji">🎉</div>
      <h1>Amazing job!</h1>
      <div class="stats-card">
        <div class="stat-row correct"
          >✅ <span id="stat-correct">0</span> correct</div
        >
        <div class="stat-row incorrect"
          >❌ <span id="stat-incorrect">0</span> incorrect</div
        >
      </div>
      <button id="play-again">Play Again 🔄</button>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
